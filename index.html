<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@600&family=Sarabun&display=swap" rel="stylesheet">
<style>

  .card{background:#fff;border:1px solid #D4DBD9;border-top:5px solid #0E7C7B;

</style>
<script>
/* ⚙️ วาง URL ของ Web App (Apps Script) ที่นี่ — ลงท้ายด้วย /exec */

if(!APP_URL.includes('XXXX')) location.replace(APP_URL);

</head>

<div class="card">

  <a class="btn" href="#" onclick="location.href=APP_URL;return false;">เข้าสู่ระบบจ่ายงาน →</a>
  <p style="margin-top:16px;font-size:.8rem">(ผู้ดูแล: เปิดไฟล์นี้แล้ววาง URL ของ Web App ในบรรทัด APP_URL)</p>

</html>
